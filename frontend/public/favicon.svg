<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 背景：天蓝圆角方块 -->
  <rect width="64" height="64" rx="14" fill="#4a90d9"/>

  <!-- 邮票：奶油底 + 锯齿打孔（天蓝圆点） -->
  <rect x="10" y="12" width="44" height="40" fill="#f8efdc"/>
  <g fill="#4a90d9">
    <!-- 上下边孔 -->
    <circle cx="14.5" cy="12" r="2.6"/><circle cx="23.5" cy="12" r="2.6"/><circle cx="32" cy="12" r="2.6"/><circle cx="40.5" cy="12" r="2.6"/><circle cx="49.5" cy="12" r="2.6"/>
    <circle cx="14.5" cy="52" r="2.6"/><circle cx="23.5" cy="52" r="2.6"/><circle cx="32" cy="52" r="2.6"/><circle cx="40.5" cy="52" r="2.6"/><circle cx="49.5" cy="52" r="2.6"/>
    <!-- 左右边孔 -->
    <circle cx="10" cy="17" r="2.6"/><circle cx="10" cy="25.5" r="2.6"/><circle cx="10" cy="34" r="2.6"/><circle cx="10" cy="42.5" r="2.6"/><circle cx="10" cy="47" r="2.6"/>
    <circle cx="54" cy="17" r="2.6"/><circle cx="54" cy="25.5" r="2.6"/><circle cx="54" cy="34" r="2.6"/><circle cx="54" cy="42.5" r="2.6"/><circle cx="54" cy="47" r="2.6"/>
  </g>

  <!-- 票面：蓝天 -->
  <rect x="15" y="17" width="34" height="30" rx="3" fill="#4a90d9"/>

  <!-- 绿色山坡 -->
  <path d="M15 40 Q32 30 49 40 L49 44 Q49 47 46 47 L18 47 Q15 47 15 44 Z" fill="#2ba95c"/>

  <!-- π（奶油色 + 藏青硬投影） -->
  <g transform="rotate(-2 32 32)">
    <g fill="rgba(44,58,86,0.45)">
      <rect x="24.5" y="24.5" width="18" height="4.2" rx="2.1"/>
      <rect x="26.5" y="27.5" width="4.2" height="14" rx="2.1" transform="rotate(4 28.6 34)"/>
      <rect x="36" y="27.5" width="4.2" height="14" rx="2.1" transform="rotate(-4 38.1 34)"/>
    </g>
    <g fill="#f8efdc">
      <rect x="23" y="23" width="18" height="4.2" rx="2.1"/>
      <rect x="25" y="26" width="4.2" height="14" rx="2.1" transform="rotate(4 27.1 33)"/>
      <rect x="34.5" y="26" width="4.2" height="14" rx="2.1" transform="rotate(-4 36.6 33)"/>
    </g>
  </g>

  <!-- 邮戳 -->
  <circle cx="44.5" cy="21.5" r="4.6" fill="none" stroke="#e2483d" stroke-width="1.6" opacity="0.9" transform="rotate(-11 44.5 21.5)"/>
  <circle cx="44.5" cy="21.5" r="1.6" fill="#e2483d" opacity="0.9"/>
</svg>
